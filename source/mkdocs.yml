site_name: "Портфолио Бондаревой Ирины"
site_description: "Сайт-портфолио студент с лабораторными работами"
site_author: "Бондарева Ирина"

# Тема оформления (Material для Material Theme)
theme:
  name: material
  language: ru
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

# Структура навигации
nav:
  - Главная: index.md
  - Об авторе: about.md
  - Лабораторные работы:
    - Лабораторная работа №1: labs/lab1.md
    - Лабораторная работа №2: labs/lab2.md
    - Лабораторная работа №3: labs/lab3.md
    - Лабораторная работа №4: labs/lab4.md

# Дополнительные настройки
markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - toc:
      permalink: true
